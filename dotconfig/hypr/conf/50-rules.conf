windowrulev2 = suppressevent maximize, class:.*
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = center, class:^(pavucontrol)$
windowrulev2 = center, class:^(blueman-manager)$
windowrulev2 = center, class:^(nm-connection-editor)$

# Steam / game launchers compatibility
windowrulev2 = immediate, class:^(steam_app_.*)$
windowrulev2 = noblur, class:^(steam_app_.*)$
windowrulev2 = noanim, class:^(steam_app_.*)$

# HOI4 and Poppy Playtime: force a clean fullscreen game surface
windowrulev2 = fullscreen, class:^(steam_app_394360)$
windowrulev2 = fullscreen, class:^(steam_app_1721470)$

# Paradox launcher windows (HOI4) are more stable in floating mode
windowrulev2 = float, title:^(Paradox Launcher)$
windowrulev2 = center, title:^(Paradox Launcher)$
windowrulev2 = size 72% 80%, title:^(Paradox Launcher)$

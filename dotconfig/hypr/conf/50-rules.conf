windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = float-pavucontrol
    match:class = ^(pavucontrol)$
    float = true
    center = true
}

windowrule {
    name = float-blueman-manager
    match:class = ^(blueman-manager)$
    float = true
    center = true
}

windowrule {
    name = float-nm-connection-editor
    match:class = ^(nm-connection-editor)$
    float = true
    center = true
}

# Steam / game launchers compatibility
windowrule {
    name = steam-app-compat
    match:class = ^(steam_app_.*)$
    immediate = true
    no_blur = true
    no_anim = true
}

# HOI4 and Poppy Playtime: force a clean fullscreen game surface
windowrule {
    name = steam-hoi4-fullscreen
    match:class = ^(steam_app_394360)$
    fullscreen = true
}

windowrule {
    name = steam-poppy-fullscreen
    match:class = ^(steam_app_1721470)$
    fullscreen = true
}

# Paradox launcher windows (HOI4) are more stable in floating mode
windowrule {
    name = paradox-launcher
    match:title = ^(Paradox Launcher)$
    float = true
    center = true
    size = 72% 80%
}

bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, B, exec, $browser
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod, D, exec, ~/.config/hypr/scripts/toggle-dashboard.sh
bind = $mainMod, A, exec, ~/.config/hypr/scripts/launchers.sh app
bind = $mainMod SHIFT, A, exec, ~/.config/hypr/scripts/launchers.sh run
bind = $mainMod ALT, A, exec, ~/.config/quickshell/end4-lite/scripts/dock-apps.sh add
bind = $mainMod ALT SHIFT, A, exec, ~/.config/quickshell/end4-lite/scripts/dock-apps.sh remove
bind = $mainMod ALT, R, exec, ~/.config/quickshell/end4-lite/scripts/dock-apps.sh remove
bind = $mainMod, W, exec, ~/.config/hypr/scripts/wallpaper-menu.sh
bind = $mainMod SHIFT, W, exec, ~/.config/hypr/scripts/wallpaper-apply.sh random
bind = $mainMod ALT, D, exec, ~/.config/hypr/scripts/start-shell.sh
bind = $mainMod ALT, S, exec, ~/.config/quickshell/end4-lite/scripts/toggle-left-settings.sh
bind = $mainMod, F10, exec, ~/.config/quickshell/end4-lite/scripts/toggle-left-settings.sh
bind = $mainMod SHIFT, SPACE, exec, ~/.config/hypr/scripts/theme-switch.sh menu
bind = $mainMod SHIFT, Q, killactive,
bind = ALT, F4, killactive,
bind = $mainMod SHIFT, E, exit,
bind = $mainMod, F, fullscreen, 1
bind = $mainMod, V, togglefloating,
bind = $mainMod, P, pseudo,
bind = $mainMod, O, togglesplit,

bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# AZERTY top-row aliases for 1..0 (without Shift).
bind = $mainMod, ampersand, workspace, 1
bind = $mainMod, eacute, workspace, 2
bind = $mainMod, quotedbl, workspace, 3
bind = $mainMod, apostrophe, workspace, 4
bind = $mainMod, parenleft, workspace, 5
bind = $mainMod, minus, workspace, 6
bind = $mainMod, egrave, workspace, 7
bind = $mainMod, underscore, workspace, 8
bind = $mainMod, ccedilla, workspace, 9
bind = $mainMod, agrave, workspace, 10

bind = $mainMod SHIFT, ampersand, movetoworkspace, 1
bind = $mainMod SHIFT, eacute, movetoworkspace, 2
bind = $mainMod SHIFT, quotedbl, movetoworkspace, 3
bind = $mainMod SHIFT, apostrophe, movetoworkspace, 4
bind = $mainMod SHIFT, parenleft, movetoworkspace, 5
bind = $mainMod SHIFT, minus, movetoworkspace, 6
bind = $mainMod SHIFT, egrave, movetoworkspace, 7
bind = $mainMod SHIFT, underscore, movetoworkspace, 8
bind = $mainMod SHIFT, ccedilla, movetoworkspace, 9
bind = $mainMod SHIFT, agrave, movetoworkspace, 10

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bind = $mainMod ALT, 1, exec, ~/.config/hypr/scripts/theme-switch.sh catppuccin
bind = $mainMod ALT, 2, exec, ~/.config/hypr/scripts/theme-switch.sh dark
bind = $mainMod ALT, 3, exec, ~/.config/hypr/scripts/theme-switch.sh light

# Screenshots
bind = , PRINT, exec, ~/.config/hypr/scripts/screenshot.sh area-copy
bind = SHIFT, PRINT, exec, ~/.config/hypr/scripts/screenshot.sh screen-copy
bind = $mainMod, PRINT, exec, ~/.config/hypr/scripts/screenshot.sh area-save
bind = $mainMod SHIFT, PRINT, exec, ~/.config/hypr/scripts/screenshot.sh screen-save
bind = ALT, PRINT, exec, ~/.config/hypr/scripts/screenshot.sh window-copy
bind = $mainMod CTRL, PRINT, exec, ~/.config/hypr/scripts/screenshot.sh open-dir

bindl = ,XF86AudioRaiseVolume, exec, pamixer -i 5
bindl = ,XF86AudioLowerVolume, exec, pamixer -d 5
bindl = ,XF86AudioMute, exec, pamixer -t
bindl = ,XF86MonBrightnessUp, exec, brightnessctl s +10%
bindl = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

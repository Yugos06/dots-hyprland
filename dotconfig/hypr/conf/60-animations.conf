animations {
    enabled = yes

    bezier = outQuart, 0.25, 1, 0.5, 1
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn, 0.25, 1, 0.5, 1

    animation = windows, 1, 6, outQuart, slide
    animation = windowsOut, 1, 8, smoothOut, popin 82%
    animation = border, 1, 8, smoothIn
    animation = borderangle, 1, 8, smoothIn
    animation = fade, 1, 7, smoothIn
    animation = workspaces, 1, 6, outQuart, slidevert
}

decoration {
    rounding = 14
    active_opacity = 1.0
    inactive_opacity = 0.9

    blur {
        enabled = true
        size = 8
        passes = 3
        vibrancy = 0.2
    }

    shadow {
        enabled = true
        range = 18
        render_power = 3
    }
}

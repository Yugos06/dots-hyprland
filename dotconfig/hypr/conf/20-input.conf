input {
    kb_layout = fr
    kb_variant = azerty
    kb_options = caps:escape
    follow_mouse = 1
    touchpad {
        natural_scroll = yes
    }
    sensitivity = 0
}

general {
    gaps_in = 6
    gaps_out = 14
    border_size = 2
    layout = dwindle
    resize_on_border = true
    allow_tearing = false
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

# Touchpad 3-finger horizontal swipe to switch workspaces.
gesture = 3, horizontal, workspace
